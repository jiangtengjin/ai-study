server:
  port: 8080

spring:
  profiles:
    active: dev,local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_study?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:root}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:your-api-key-here}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7
          max-tokens: 4096

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Sa-Token 配置
sa-token:
  token-name: satoken
  timeout: 1209600
  active-timeout: 86400
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-write-header: true
  is-log: false

# Tavily 搜索配置
tavily:
  api-key: ${TAVILY_API_KEY:your-tavily-api-key}
  base-url: https://api.tavily.com

# 知识库向量存储配置
vectorstore:
  store-path: ${VECTORSTORE_PATH:./data/vectorstore}

# 通义千问 Embedding 配置
embedding:
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: text-embedding-v3

# GitHub OAuth 配置
github:
  client-id: ${GITHUB_CLIENT_ID:your-client-id}
  client-secret: ${GITHUB_CLIENT_SECRET:your-client-secret}
  redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/api/v1/auth/github/callback}
  frontend-callback-url: ${GITHUB_FRONTEND_CALLBACK:http://localhost:5173/oauth/callback}

# Knife4j API 文档
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /api/**

logging:
  level:
    com.aistudy: DEBUG
    com.aistudy.mapper: DEBUG
